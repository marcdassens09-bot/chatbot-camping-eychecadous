<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assistant — Camping Les Eychecadous</title>
  <style>
    /* ─── RESET & BASE ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a1a10;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes scintille  { 0%,100%{opacity:1;}  50%{opacity:0.15;} }
    @keyframes scintille2 { 0%,100%{opacity:0.5;} 50%{opacity:1;}   }
    @keyframes nuage      { 0%{transform:translateX(0);} 100%{transform:translateX(28px);} }
    @keyframes nuage2     { 0%{transform:translateX(0);} 100%{transform:translateX(-22px);} }
    @keyframes braise     { 0%,100%{opacity:0.9;} 50%{opacity:0.25;} }
    @keyframes braise2    { 0%,100%{opacity:0.6;} 50%{opacity:1;}    }
    @keyframes lumiere    { 0%,100%{opacity:0.85;} 50%{opacity:1;}   }
    @keyframes slideUp    { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

    .s1  { animation: scintille  2.1s ease-in-out infinite; }
    .s2  { animation: scintille2 1.7s ease-in-out infinite; }
    .s3  { animation: scintille  3s   ease-in-out infinite 0.5s; }
    .s4  { animation: scintille2 2.4s ease-in-out infinite 0.8s; }
    .s5  { animation: scintille  1.9s ease-in-out infinite 1.2s; }
    .s6  { animation: scintille2 2.8s ease-in-out infinite 0.3s; }
    .s7  { animation: scintille  2.2s ease-in-out infinite 1.5s; }
    .s8  { animation: scintille2 1.5s ease-in-out infinite 0.9s; }
    .na  { animation: nuage  14s ease-in-out infinite alternate; }
    .nb  { animation: nuage2 18s ease-in-out infinite alternate; }
    .br1 { animation: braise  1.1s ease-in-out infinite; }
    .br2 { animation: braise2 0.9s ease-in-out infinite 0.3s; }
    .br3 { animation: braise  1.4s ease-in-out infinite 0.6s; }
    .lum { animation: lumiere 2.5s ease-in-out infinite; }

    /* ─── LAYOUT ─── */
    #app {
      display: flex;
      flex-direction: column;
      max-width: 480px;
      min-height: 100dvh;
      margin: 0 auto;
      background: #0a1a10;
      transition: background 3s ease-in-out;
    }
    #app.mode-jour { background: #e8f5e9; }

    /* ─── HEADER ─── */
    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #0f2318;
      border-bottom: 1px solid #1F7A4D33;
      transition: background 3s ease-in-out;
      flex-shrink: 0;
    }
    #app.mode-jour .hdr { background: #1b6a8a; border-bottom-color: transparent; }

    .av {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #1F7A4D;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      border: 2px solid #E8730A;
      flex-shrink: 0;
    }
    .hdr-txt { flex: 1; }
    .hdr-txt h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .hdr-txt p  { font-size: 11px; color: #5aaa78; transition: color 3s; }
    #app.mode-jour .hdr-txt p { color: #a8dff0; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      flex-shrink: 0;
    }

    /* ─── SCÈNE ANIMÉE ─── */
    .scene-wrap {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .scene-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      transition: opacity 3s ease-in-out;
    }
    .scene-wrap svg { display: block; width: 100%; height: 100%; }

    /* ─── ZONE CHAT ─── */
    .chat-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px 14px 0;
      overflow-y: auto;
      gap: 10px;
    }

    /* Messages */
    .msg {
      max-width: 85%;
      padding: 10px 13px;
      border-radius: 4px 14px 14px 14px;
      font-size: 14px;
      line-height: 1.55;
      animation: slideUp 0.25s ease;
    }
    .msg.bot {
      background: #1a4d30;
      color: #dff0e8;
      align-self: flex-start;
      transition: background 3s, color 3s;
    }
    #app.mode-jour .msg.bot { background: #1F7A4D; color: #fff; }
    .msg.user {
      background: #E8730A;
      color: #fff;
      align-self: flex-end;
      border-radius: 14px 4px 14px 14px;
    }

    /* Boutons rapides */
    .quick-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding-bottom: 4px;
    }
    .qbtn {
      background: transparent;
      border: 1px solid #1F7A4D;
      color: #5aaa78;
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 3s;
    }
    #app.mode-jour .qbtn {
      background: #fff;
      color: #1F7A4D;
    }
    .qbtn:hover { background: #1F7A4D; color: #fff; }

    /* Indicateur frappe */
    .typing {
      display: flex; gap: 4px; align-items: center;
      padding: 8px 13px;
      background: #1a4d30;
      border-radius: 4px 14px 14px 14px;
      align-self: flex-start;
      width: fit-content;
      transition: background 3s;
    }
    #app.mode-jour .typing { background: #1F7A4D44; }
    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5aaa78;
      animation: braise 0.8s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    /* ─── BARRE SAISIE ─── */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px 12px;
      background: #0a1a10;
      border-top: 1px solid #1F7A4D22;
      flex-shrink: 0;
      transition: background 3s;
    }
    #app.mode-jour .input-bar { background: #e8f5e9; }

    .inp-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #0f2318;
      border: 1px solid #1F7A4D44;
      border-radius: 24px;
      padding: 8px 14px;
      gap: 8px;
      transition: background 3s, border-color 3s;
    }
    #app.mode-jour .inp-wrap { background: #fff; border-color: #1F7A4D66; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: #dff0e8;
      transition: color 3s;
    }
    #app.mode-jour #user-input { color: #1b3a2b; }
    #user-input::placeholder { color: #2d6040; transition: color 3s; }
    #app.mode-jour #user-input::placeholder { color: #aaa; }

    /* Bouton micro */
    #mic-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #2d6040;
      font-size: 16px;
      padding: 0;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    #mic-btn.active { color: #E8730A; }

    /* Bouton envoyer */
    #send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #E8730A;
      border: none;
      cursor: pointer;
      color: #fff;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    #send-btn:hover { transform: scale(1.08); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ─── RGPD ─── */
    .rgpd {
      font-size: 10px;
      color: #1e4a2a;
      text-align: center;
      padding: 4px 0 8px;
      transition: color 3s;
    }
    #app.mode-jour .rgpd { color: #4a7a5e; }

// ─── MODE JOUR / NUIT ───────────────────────────────────────────────────────
function updateMode() {
  const h = new Date().getHours();
  const app  = document.getElementById('app');
  const lj   = document.getElementById('l-jour');
  const ln   = document.getElementById('l-nuit');
  const isDay = (h >= 7 && h < 21);
  if (isDay) {
    app.classList.add('mode-jour');
    lj.style.opacity = '1';
    ln.style.opacity = '0';
  } else {
    app.classList.remove('mode-jour');
    lj.style.opacity = '0';
    ln.style.opacity = '1';
  }
  return isDay;
}
const estJour = updateMode();
setInterval(updateMode, 60000);

// ─── CHAT ───────────────────────────────────────────────────────────────────
const chatZone  = document.getElementById('chat-zone');
const inputEl   = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');
const micBtn    = document.getElementById('mic-btn');

function addMsg(texte, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = texte.replace(/\n/g, '<br>');
  chatZone.appendChild(div);
  chatZone.scrollTop = chatZone.scrollHeight;
  return div;
}

function showQuickBtns() {
  const wrap = document.createElement('div');
  wrap.className = 'quick-wrap';
  ['⛺ Hébergements','💶 Tarifs','🐾 Animaux','📍 Accès'].forEach(label => {
    const b = document.createElement('button');
    b.className = 'qbtn';
    b.textContent = label;
    b.onclick = () => { wrap.remove(); envoyer(label.replace(/^.+? /, '')); };
    wrap.appendChild(b);
  });
  chatZone.appendChild(wrap);
  chatZone.scrollTop = chatZone.scrollHeight;
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  chatZone.appendChild(d);
  chatZone.scrollTop = chatZone.scrollHeight;
  return d;
}

// Message d'accueil
const salut = estJour ? 'Bonjour' : 'Bonsoir';
addMsg(salut + ' ! 👋 Heureux de vous accueillir parmi nous.\n\nComment puis-je vous aider ?', 'bot');
showQuickBtns();

// ─── ENVOI ──────────────────────────────────────────────────────────────────
async function envoyer(texteForce) {
  const texte = (texteForce || inputEl.value).trim();
  if (!texte) return;
  inputEl.value = '';
  sendBtn.disabled = true;

  addMsg(texte, 'user');
  const typing = showTyping();

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: texte })
    });
    const data = await resp.json();
    typing.remove();
    addMsg(data.reponse || "Désolé, je n'ai pas pu répondre.", 'bot');
  } catch {
    typing.remove();
    addMsg("Une erreur est survenue. Réessayez dans un instant.", 'bot');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', () => envoyer());
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') envoyer(); });

// ─── MICRO (Web Speech API) ──────────────────────────────────────────────────
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'fr-FR';
  rec.continuous = false;
  rec.interimResults = false;
  let recActive = false;

  micBtn.addEventListener('click', () => {
    if (recActive) { rec.stop(); return; }
    rec.start();
  });
  rec.onstart = () => { recActive = true;  micBtn.classList.add('active'); };
  rec.onend   = () => { recActive = false; micBtn.classList.remove('active'); };
  rec.onresult = e => {
    inputEl.value = e.results[0][0].transcript;
    envoyer();
  };
} else {
  micBtn.style.display = 'none';
}
</script>
