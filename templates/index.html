<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Camping Les Eychecadous — Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-dark:#1a5632;
    --green:#2a8c4a;
    --green-light:#e6f5ec;
    --sand:#faf6f0;
    --ink:#1c2b21;
    --line:#dde8df;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Figtree",system-ui,sans-serif;
    background:var(--sand);
    color:var(--ink);
    display:flex;flex-direction:column;height:100vh;
  }

  .head{
    display:flex;align-items:center;gap:12px;
    padding:16px 18px;
    background:linear-gradient(135deg,var(--green-dark),var(--green));
    color:#fff;flex-shrink:0;
  }
  .head .av{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:1.3rem}
  .head .who{font-weight:600;font-size:1.05rem;line-height:1.2}
  .head .who small{display:block;font-weight:400;font-size:.75rem;color:rgba(255,255,255,.75)}

  .messages{
    flex:1;overflow-y:auto;padding:20px 16px;
    display:flex;flex-direction:column;gap:12px;
  }
  .msg{max-width:82%;padding:12px 16px;border-radius:16px;font-size:.96rem;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .msg.bot{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px}
  .msg.user{align-self:flex-end;background:var(--green-dark);color:#fff;border-bottom-right-radius:5px}
  .msg a{color:inherit;font-weight:600}

  .quick-btns{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 8px;align-self:flex-start}
  .quick-btns button{
    background:var(--green-light);border:1.5px solid var(--green);color:var(--green-dark);
    padding:8px 14px;border-radius:999px;font-size:.88rem;font-family:inherit;
    font-weight:500;cursor:pointer;transition:background .15s ease;
  }
  .quick-btns button:hover{background:#d0edda}

  .typing{align-self:flex-start;background:#fff;border:1px solid var(--line);border-radius:16px;border-bottom-left-radius:5px;padding:13px 16px;display:flex;gap:5px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#9DB3A6;animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}

  .bar{
    display:flex;gap:9px;padding:12px 14px;background:#fff;border-top:1px solid var(--line);flex-shrink:0;
  }
  .bar input{
    flex:1;border:1.5px solid var(--line);border-radius:999px;
    padding:12px 18px;font-size:.96rem;font-family:inherit;outline:none;
  }
  .bar input:focus{border-color:var(--green)}
  .bar button{
    border:none;background:var(--green);color:#fff;border-radius:50%;
    width:46px;height:46px;flex-shrink:0;cursor:pointer;display:grid;place-items:center;
    transition:background .15s ease;
  }
  .bar button:hover{background:#237a3f}
  .bar button:disabled{background:#b7d3c3;cursor:not-allowed}
  .bar button svg{width:20px;height:20px}

  .rgpd{text-align:center;padding:6px 14px;font-size:.72rem;color:#8a9b8f;background:#fff;border-top:1px solid var(--line)}

  @media (prefers-reduced-motion:reduce){
    .typing span{animation:none;opacity:.6}
  }
</style>
</head>
<body>

  <div class="head">
    <span class="av">⛺</span>
    <div class="who">Camping Les Eychecadous<small>En ligne · posez votre question</small></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="bar">
    <input type="text" id="input" placeholder="Votre question sur le camping..." autocomplete="off" maxlength="500" />
    <button id="send" aria-label="Envoyer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

  <div class="rgpd">🔒 Vos données ne sont ni stockées ni transmises à des tiers.</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendEl = document.getElementById("send");
  let historique = [];

  function ajouterMessage(texte, qui){
    const div = document.createElement("div");
    div.className = "msg " + qui;
    const html = texte
      .replace(/([\w.-]+@[\w.-]+\.\w+)/g, '<a href="mailto:$1">$1</a>')
      .replace(/(reservation\.secureholiday\.net\/fr\/5438\/)/g, '<a href="https://$1" target="_blank">$1</a>');
    div.innerHTML = html;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function ajouterBoutonsRapides(){
    const wrap = document.createElement("div");
    wrap.className = "quick-btns";
    const questions = [
      "Quels sont vos tarifs ?",
      "Quels hébergements proposez-vous ?",
      "Acceptez-vous les animaux ?",
      "Comment réserver ?",
      "Que faire dans les environs ?"
    ];
    questions.forEach(q => {
      const btn = document.createElement("button");
      btn.textContent = q;
      btn.addEventListener("click", () => {
        wrap.remove();
        inputEl.value = q;
        envoyer();
      });
      wrap.appendChild(btn);
    });
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function montrerTyping(){
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.innerHTML = "<span></span><span></span><span></span>";
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function cacherTyping(){
    const t = document.getElementById("typing");
    if(t) t.remove();
  }

  async function envoyer(){
    const texte = inputEl.value.trim();
    if(!texte) return;

    ajouterMessage(texte, "user");
    inputEl.value = "";
    sendEl.disabled = true;
    montrerTyping();

    try{
      const rep = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: texte, historique: historique })
      });
      const data = await rep.json();
      cacherTyping();
      ajouterMessage(data.reponse, "bot");
      if(data.historique) historique = data.historique;
    }catch(e){
      cacherTyping();
      ajouterMessage("Désolé, un problème est survenu. Réessayez dans un instant.", "bot");
    }finally{
      sendEl.disabled = false;
      inputEl.focus();
    }
  }

  sendEl.addEventListener("click", envoyer);
  inputEl.addEventListener("keydown", e => { if(e.key === "Enter") envoyer(); });

  // Message d'accueil
  ajouterMessage(
    "Bonjour ! 👋 Bienvenue au Camping Les Eychecadous, votre petit coin de nature en Ariège.\n\nJe peux vous renseigner sur nos hébergements, nos tarifs, les activités ou vous aider à préparer votre séjour. Que souhaitez-vous savoir ?",
    "bot"
  );
  ajouterBoutonsRapides();
  inputEl.focus();
</script>

</body>
</html>
